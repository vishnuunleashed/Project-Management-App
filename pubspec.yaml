name: sample_project_enhanced_features
description: "Sample Code Snippet With Enhanced Features Such as Offline Capability, Firebase, Dashboards."
publish_to: 'play store and app store'
version: 1.10.0+16
environment:
  sdk: '>=3.0.6 <4.0.0'
  flutter: ">=3.10.6"


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  intl: any
  base:
    path: base
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.2.0
  carousel_slider: ^5.1.1
  dotted_border: ^2.1.0
  permission_handler: ^12.0.0
  scrollable_positioned_list: ^0.3.8
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  expandable_page_view: ^1.0.17
  go_router: ^16.1.0
  fl_chart: ^1.0.0
  flutter_local_notifications: ^19.4.1
  dio: ^5.9.0
  shared_preferences: ^2.2.2
  eraser:
    path: eraser-main
  dropdown_search: ^5.0.6
  photo_view: ^0.15.0
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^9.2.4
  visibility_detector: ^0.3.3
  location: ^5.0.3
  geocoding: ^4.0.0
  flutter_map: ^8.2.2
  http: ^1.6.0
  latlong2: ^0.9.1

  proj4dart: ^2.1.0
  url_launcher: ^6.3.2
  flutter_slidable: ^3.0.0
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  syncfusion_flutter_pdfviewer: ^30.2.4
  webview_flutter: ^4.10.0
  animated_theme_switcher: ^2.0.10
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  open_filex: ^4.5.0
  connectivity_plus: ^6.1.4
  workmanager: ^0.9.0+3
  dcc_module:
    path: packages/dcc_module





# dev_dependency below
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


# assets and fonts below
flutter:
  uses-material-design: true

  assets:
    - assets/svgs/
    - assets/svgs/empty_list/
    - assets/png/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/font/Plus_Jakarta_Sans/PlusJakartaSans-Light.ttf
          weight: 300
        - asset: assets/font/Plus_Jakarta_Sans/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/font/Plus_Jakarta_Sans/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/font/Plus_Jakarta_Sans/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/font/Plus_Jakarta_Sans/PlusJakartaSans-Bold.ttf
          weight: 700
    - family: Righteous
      fonts:
        - asset: assets/font/Righteous/Righteous-Regular.ttf