name: dcc_module
description: A standalone Document Control Center (DCC) module for Flutter apps.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  open_filex: ^4.5.0
  connectivity_plus: ^6.1.4
  dio: ^5.9.0
  path_provider: ^2.1.2
  flutter_riverpod: ^2.6.1
  http: ^1.2.1
  intl: ^0.19.0
  flutter_secure_storage: ^9.2.4
  webview_flutter: ^4.2.2
  flutter_pdfview: ^1.4.4
  flutter_svg: ^2.2.0
  url_launcher: ^6.3.2
  go_router: ^16.1.0
  eraser:
    path: ../../eraser-main
  base:
    path: ../../base


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
